spring.application.name=MemoryBox

server.port=8080

spring.datasource.url=jdbc:mariadb://localhost:3306/memorybox_local
spring.datasource.username=memorybox
spring.datasource.password=mb1234
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.hogudeul.memorybox.model
mybatis.configuration.map-underscore-to-camel-case=true

spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

logging.level.com.hogudeul.memorybox.mapper=DEBUG

app.storage.local-root=D:/memorybox/upload/

spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=500MB
spring.mvc.async.request-timeout=600000

app.feed.new-threshold-hours=24
app.ffmpeg.command=ffmpeg
# Windows 예시: app.ffmpeg.command=C:/ffmpeg/bin/ffmpeg.exe
app.video.max-file-size-bytes=314572800

app.auth.remember-days=30
app.auth.remember-cookie-name=remember_token
app.auth.remember-secure=true
app.auth.last-access-update-minutes=10

app.calendar.enabled=true
app.calendar.sources[0].name=우리 일정
app.calendar.sources[0].url=
app.calendar.sources[0].type=PERSONAL
app.calendar.sources[1].name=대한민국 공휴일
app.calendar.sources[1].url=
app.calendar.sources[1].type=HOLIDAY
