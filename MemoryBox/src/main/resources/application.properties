kakao.client-id=${KAKAO_CLIENT_ID:}
kakao.redirect-uri=${KAKAO_REDIRECT_URI:}
kakao.login-redirect-uri=${KAKAO_LOGIN_REDIRECT_URI:}
kakao.javascript-key=${KAKAO_JAVASCRIPT_KEY:}

# VAPID 키가 없다면: npx web-push generate-vapid-keys
webpush.vapid.public-key=${WEBPUSH_VAPID_PUBLIC_KEY:}
webpush.vapid.private-key=${WEBPUSH_VAPID_PRIVATE_KEY:}
webpush.vapid.subject=${WEBPUSH_VAPID_SUBJECT:mailto:test@example.com}

spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

# 공유/카카오 미리보기에서 외부 접근 가능한 절대 URL 생성을 위한 기준 도메인
# - 로컬 테스트: https://illusion-tassel-passcode.ngrok-free.dev
# - 운영 배포 시: APP_SHARE_BASE_URL 환경변수로 서비스 도메인 주입
app.share.base-url=${APP_SHARE_BASE_URL:https://illusion-tassel-passcode.ngrok-free.dev}

server.error.whitelabel.enabled=false

logging.level.root=INFO
logging.level.com.hogudeul=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.multipart=DEBUG

logging.file.name=/var/log/memorybox.log