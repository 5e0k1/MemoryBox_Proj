# 운영/개발 환경에서 민감 정보를 주입하기 위한 템플릿입니다.
# 절대 실제 값을 Git에 커밋하지 마세요.

spring:
  datasource:
    url: jdbc:mariadb://<db-host>:3306/<db-name>
    username: <db-username>
    password: <db-password>

app:
  ffmpeg:
    command: <ffmpeg-command-or-absolute-path>
  storage:
    type: <local|s3>
    local-root: <local-storage-root>
    public-base-url: <public-base-url>
    s3:
      bucket: <s3-bucket-name>
      region: <aws-region>
      prefix: <s3-prefix>
    cloudfront:
      domain: <cloudfront-domain>
  auth:
    remember-days: <remember-days>
    remember-cookie-name: <remember-cookie-name>
    remember-secure: <true-or-false>
    last-access-update-minutes: <minutes>
  calendar:
    enabled: <true-or-false>
    sources:
      - name: 우리 일정
        url: <calendar-personal-ics-url>
        type: PERSONAL
      - name: 대한민국 공휴일
        url: <calendar-holiday-ics-url>
        type: HOLIDAY
